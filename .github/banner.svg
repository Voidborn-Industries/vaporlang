<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#0f0d1a"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="logo-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="logo-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="orb1" cx="30%" cy="40%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="70%" cy="60%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#glow)"/>
  <ellipse cx="360" cy="160" rx="400" ry="250" fill="url(#orb1)"/>
  <ellipse cx="840" cy="160" rx="350" ry="200" fill="url(#orb2)"/>

  <!-- Top border accent -->
  <rect x="0" y="0" width="1200" height="1" fill="url(#logo-grad)" opacity="0.4"/>

  <!-- Logo mark -->
  <g transform="translate(520, 55)" filter="url(#logo-glow)">
    <path d="M40 0L80 70L120 0L105 0L80 45L55 0Z" fill="url(#logo-grad)"/>
    <path d="M55 0L80 45L105 0L95 0L80 28L65 0Z" fill="url(#logo-grad)" opacity="0.4"/>
  </g>

  <!-- Title -->
  <text x="600" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="url(#text-grad)" letter-spacing="-2">VaporLang</text>

  <!-- Subtitle -->
  <text x="600" y="210" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#a1a1aa" font-weight="400">The next-gen, alignment-first programming language</text>

  <!-- Tags -->
  <g transform="translate(600, 240)" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#71717a">
    <rect x="-260" y="-12" width="100" height="24" rx="12" fill="none" stroke="#27272a" stroke-width="1"/>
    <text x="-210" y="4">AI-native</text>
    <rect x="-145" y="-12" width="110" height="24" rx="12" fill="none" stroke="#27272a" stroke-width="1"/>
    <text x="-90" y="4">WASM-first</text>
    <rect x="-20" y="-12" width="130" height="24" rx="12" fill="none" stroke="#27272a" stroke-width="1"/>
    <text x="45" y="4">Probabilistic</text>
    <rect x="125" y="-12" width="120" height="24" rx="12" fill="none" stroke="#27272a" stroke-width="1"/>
    <text x="185" y="4">Open source</text>
  </g>

  <!-- Bottom border accent -->
  <rect x="0" y="319" width="1200" height="1" fill="url(#logo-grad)" opacity="0.2"/>
</svg>
