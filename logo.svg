<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="vg-main" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#6d8ff8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="vg-inner" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="vg-core" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Outer chevron – largest, defines the V silhouette -->
  <path d="
    M 96 120
    L 256 420
    L 416 120
    L 344 120
    L 256 310
    L 168 120
    Z
  " fill="url(#vg-main)"/>

  <!-- Middle chevron – offset upward, creates layered depth -->
  <path d="
    M 144 100
    L 256 340
    L 368 100
    L 312 100
    L 256 230
    L 200 100
    Z
  " fill="url(#vg-inner)"/>

  <!-- Inner accent – small bright chevron at the top for the "vapor wisp" -->
  <path d="
    M 208 88
    L 256 190
    L 304 88
    L 272 88
    L 256 140
    L 240 88
    Z
  " fill="url(#vg-core)"/>
</svg>
