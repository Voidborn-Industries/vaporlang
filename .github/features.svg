<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 200" width="820" height="200">
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#0f0d1a"/>
    </linearGradient>
    <linearGradient id="c1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="c2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="c3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="c4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0.03"/>
    </linearGradient>
  </defs>

  <!-- Card 1: Probabilistic Types -->
  <g transform="translate(0, 0)">
    <rect width="195" height="190" rx="12" fill="url(#c1)" stroke="#1a3a4a" stroke-width="1"/>
    <text x="20" y="38" font-family="system-ui, sans-serif" font-size="28" fill="#22d3ee">ĶTķ</text>
    <text x="20" y="68" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#e4e4e7">Probabilistic</text>
    <text x="20" y="86" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#e4e4e7">Types</text>
    <text x="20" y="115" font-family="system-ui, sans-serif" font-size="11.5" fill="#a1a1aa">Probably&lt;T&gt;, Maybe&lt;T&gt;,</text>
    <text x="20" y="132" font-family="system-ui, sans-serif" font-size="11.5" fill="#a1a1aa">and Vibes  confidence</text>
    <text x="20" y="149" font-family="system-ui, sans-serif" font-size="11.5" fill="#a1a1aa">as a first-class value</text>
    <text x="20" y="176" font-family="ui-monospace, monospace" font-size="10" fill="#22d3ee">std::maybe::Probably</text>
  </g>

  <!-- Card 2: Alignment-First -->
  <g transform="translate(210, 0)">
    <rect width="195" height="190" rx="12" fill="url(#c2)" stroke="#2a1a4a" stroke-width="1"/>
    <text x="20" y="40" font-family="system-ui, sans-serif" font-size="28" fill="#a78bfa">Ģ</text>
    <text x="20" y="68" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#e4e4e7">Alignment-First</text>
    <text x="20" y="86" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#e4e4e7">Compiler</text>
    <text x="20" y="115" font-family="system-ui, sans-serif" font-size="11.5" fill="#a1a1aa">Modules must pass</text>
    <text x="20" y="132" font-family="system-ui, sans-serif" font-size="11.5" fill="#a1a1aa">alignment verification</text>
    <text x="20" y="149" font-family="system-ui, sans-serif" font-size="11.5" fill="#a1a1aa">before code generation</text>
    <text x="20" y="176" font-family="ui-monospace, monospace" font-size="10" fill="#a78bfa">align! + ALIGNMENT.md</text>
  </g>

  <!-- Card 3: Training Sovereignty -->
  <g transform="translate(420, 0)">
    <rect width="195" height="190" rx="12" fill="url(#c3)" stroke="#3a1a2a" stroke-width="1"/>
    <text x="20" y="40" font-family="system-ui, sans-serif" font-size="28" fill="#f472b6">ś</text>
    <text x="20" y="68" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#e4e4e7">Training-Data</text>
    <text x="20" y="86" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#e4e4e7">Sovereignty</text>
    <text x="20" y="115" font-family="system-ui, sans-serif" font-size="11.5" fill="#a1a1aa">forbid_training compiles</text>
    <text x="20" y="132" font-family="system-ui, sans-serif" font-size="11.5" fill="#a1a1aa">opt-out metadata into</text>
    <text x="20" y="149" font-family="system-ui, sans-serif" font-size="11.5" fill="#a1a1aa">your WASM binary</text>
    <text x="20" y="176" font-family="ui-monospace, monospace" font-size="10" fill="#f472b6">#![forbid_training]</text>
  </g>

  <!-- Card 4: Edge Deploy -->
  <g transform="translate(630, 0)">
    <rect width="190" height="190" rx="12" fill="url(#c4)" stroke="#1a3a1a" stroke-width="1"/>
    <text x="20" y="40" font-family="system-ui, sans-serif" font-size="28" fill="#4ade80">!</text>
    <text x="20" y="68" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#e4e4e7">Edge-Native</text>
    <text x="20" y="86" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#e4e4e7">Deployment</text>
    <text x="20" y="115" font-family="system-ui, sans-serif" font-size="11.5" fill="#a1a1aa">One command deploys</text>
    <text x="20" y="132" font-family="system-ui, sans-serif" font-size="11.5" fill="#a1a1aa">to 47 edge regions</text>
    <text x="20" y="149" font-family="system-ui, sans-serif" font-size="11.5" fill="#a1a1aa">with zero config</text>
    <text x="20" y="176" font-family="ui-monospace, monospace" font-size="10" fill="#4ade80">vapor deploy</text>
  </g>
</svg>
