<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 420" width="820" height="420">
  <defs>
    <linearGradient id="tbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#111118"/>
    </linearGradient>
  </defs>

  <!-- Window chrome -->
  <rect width="820" height="420" rx="12" fill="url(#tbg)" stroke="#2a2a3a" stroke-width="1"/>
  <rect width="820" height="38" rx="12" fill="#16161e"/>
  <rect x="0" y="26" width="820" height="12" fill="#16161e"/>
  <line x1="0" y1="38" x2="820" y2="38" stroke="#2a2a3a" stroke-width="1"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="19" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="19" r="6" fill="#febc2e"/>
  <circle cx="60" cy="19" r="6" fill="#28c840"/>

  <!-- Title bar text -->
  <text x="410" y="24" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#71717a">vapor build --release --vibes</text>

  <!-- Terminal content -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" transform="translate(24, 60)">

    <text y="0" fill="#4ade80" font-weight="600">   Compiling</text>
    <text y="0" x="105" fill="#d4d4d8"> examples/hello.vp (vaporlang 0.1.0)</text>

    <text y="30" fill="#4ade80" font-weight="600">      Lexing</text>
    <text y="30" x="105" fill="#d4d4d8"> 24 lines of source</text>
    <text y="50" x="105" fill="#71717a"> keywords: conviction, use, maybe, align!, Probably, fn, let, Vibes</text>

    <text y="80" fill="#4ade80" font-weight="600">    Aligning</text>
    <text y="80" x="105" fill="#d4d4d8"> alignment score: 8/10</text>
    <text y="100" fill="#4ade80">           </text>
    <text y="100" x="120" fill="#d4d4d8"> alignment policy satisfied</text>

    <text y="130" fill="#4ade80" font-weight="600">    Checking</text>
    <text y="130" x="105" fill="#d4d4d8"> 1 function, 0 structs</text>
    <text y="150" fill="#4ade80">           </text>
    <text y="150" x="120" fill="#d4d4d8"> resolved 13 probabilistic types</text>
    <text y="170" x="105" fill="#71717a"> note: Probably&lt;T&gt; types resolved with p=0.87</text>

    <text y="200" fill="#4ade80" font-weight="600">  Generating</text>
    <text y="200" x="105" fill="#d4d4d8"> hello.wasm (target: wasm32-unknown-vibes)</text>

    <!-- Progress bar -->
    <text y="220" fill="#22d3ee">    Emitting</text>
    <text y="220" x="105" fill="#d4d4d8"> [</text>
    <text y="220" x="114" fill="#4ade80">ˆˆˆˆˆˆˆˆˆˆˆˆˆˆˆˆˆˆˆˆˆˆˆˆˆˆˆˆˆˆ</text>
    <text y="220" x="354" fill="#d4d4d8">] 100%</text>

    <text y="250" fill="#4ade80" font-weight="600">     Linking</text>
    <text y="250" x="105" fill="#d4d4d8"> std::maybe, std::conviction</text>

    <text y="280" fill="#4ade80" font-weight="600">    Finished</text>
    <text y="280" x="105" fill="#f4f4f5" font-weight="600"> hello.wasm</text>
    <text y="280" x="210" fill="#d4d4d8"> (2,152 bytes)</text>
    <text y="300" x="105" fill="#71717a"> compiled in 0.16s</text>

    <text y="340" fill="#22d3ee">  Protecting</text>
    <text y="340" x="105" fill="#d4d4d8"> applying training data exclusion fence</text>
    <text y="360" fill="#4ade80">           </text>
    <text y="360" x="120" fill="#d4d4d8"> model training opt-out compiled into binary headers</text>
  </g>
</svg>
